FROM alpine:latest

# Install security tools and clean package cache in a single layer
RUN apk add --no-cache \
    git \
    bash \
    yara \
    curl \
    jq

# Create a secure system group and user with matching IDs
RUN addgroup -S auditorgroup && adduser -S auditoruser -G auditorgroup

# Create paths and set up the YARA signatures securely
WORKDIR /home/auditoruser/analysis
RUN mkdir -p /home/auditoruser/rules && \
    curl -sL "https://raw.githubusercontent.com/Neo23x0/signature-base/master/yara/gen_webshells.yar" -o /home/auditoruser/rules/webshells.yar && \
    chown -R auditoruser:auditorgroup /home/auditoruser

# Drop privileges to the non-root user
USER auditoruser

# Keep container alive for background exec commands
CMD ["sleep", "infinity"]